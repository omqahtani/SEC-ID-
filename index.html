
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEC ID Request Form</title>

<style>
body{
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(180deg,#eef3fb,#f9fbff);
margin:0;
padding:40px;
}

.container{
max-width:1000px;
margin:auto;
}

.header{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
margin-bottom:20px;
display:flex;
align-items:center;
gap:20px;
}

.logo{
height:60px;
}

.header-title h1{
margin:0;
font-size:26px;
color:#0f62fe;
}

.header-title p{
margin-top:6px;
color:#555;
font-size:14px;
}

.card{
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.full{
grid-column:1/-1;
}

label{
font-weight:600;
font-size:14px;
margin-bottom:6px;
display:block;
}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #d1d5db;
font-size:14px;
}

button{
background:#0f62fe;
color:white;
border:none;
padding:14px 24px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.docs{
background:#f8fafc;
border:1px solid #e5e7eb;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="logo.png" class="logo">
<div class="header-title">
<h1>SEC ID Request Form</h1>
<p>Fill the form then press submit. Email will open ready to send.</p>
</div>
</div>

<div class="card">

<div class="docs">
<b>Required Attachments (attach them in the email before sending):</b>
<ul>
<li>ID Copy</li>
<li>Personal Photo (White Background)</li>
<li>Muqeem Report</li>
<li>Ajeer Report (If Applicable)</li>
</ul>
</div>

<form class="grid">

<div class="full">
<label>Full Name</label>
<input type="text" id="name">
</div>

<div>
<label>ID / Iqama Number</label>
<input type="text" id="id">
</div>

<div>
<label>Date of Birth</label>
<input type="date" id="dob">
</div>

<div>
<label>Mobile Number</label>
<input type="text" id="mobile">
</div>

<div>
<label>Employee Email</label>
<input type="email" id="email">
</div>

<div>
<label>Direct Manager Email</label>
<input type="email" id="manager">
</div>

<div class="full">
<label>Approval Authority / Department</label>
<input type="text" id="approval">
</div>

<div>
<label>Blood Type</label>
<select id="blood">
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>
</div>

<div>
<label>Educational Qualification</label>
<select id="edu">
<option>High School</option>
<option>Diploma</option>
<option>Bachelor’s Degree</option>
<option>Master’s Degree</option>
<option>PhD</option>
<option>Other</option>
</select>
</div>

<div>
<label>Project Name</label>
<select id="project" onchange="setContract()">
<option value="">Select</option>
<option data-contract="4400019484">Interconnection of Qanadeel BSP in Makkah</option>
<option data-contract="4400021671">INSTALLATION OF 110 KV UGC FOR THE NEW R</option>
<option data-contract="4400022990">CONNECTING THE NEW CULTURE OASIS SUBSTAT</option>
<option data-contract="4400023177">INSTALL OF 110 KV UGC ALNOOR IN MAKKAH</option>
<option data-contract="4400023283">Construction interconnection in UMLUJ</option>
</select>
</div>

<div>
<label>Contract Number</label>
<input type="text" id="contract" readonly>
</div>

<div>
<label>Region</label>
<select id="region">
<option>Central Region</option>
<option>Eastern Region</option>
<option>Western Region</option>
<option>Northern Region</option>
<option>Southern Region</option>
</select>
</div>

<div>
<label>Request Type</label>
<select id="type">
<option>New</option>
<option>Replacement (Lost)</option>
<option>Replacement (Damaged)</option>
</select>
</div>

<div class="full">
<button type="button" onclick="sendEmail()">Submit Request</button>
</div>

</form>

</div>
</div>

<script>

function setContract(){
let p=document.getElementById("project");
let contract=p.options[p.selectedIndex].getAttribute("data-contract");
document.getElementById("contract").value=contract||"";
}

function sendEmail(){

const fullName = document.getElementById("name").value;
const idIqama = document.getElementById("id").value;
const dob = document.getElementById("dob").value;
const mobile = document.getElementById("mobile").value;
const employeeEmail = document.getElementById("email").value;
const managerEmail = document.getElementById("manager").value;
const approval = document.getElementById("approval").value;
const blood = document.getElementById("blood").value;
const edu = document.getElementById("edu").value;
const project = document.getElementById("project").value;
const contract = document.getElementById("contract").value;
const region = document.getElementById("region").value;
const type = document.getElementById("type").value;

let body=`SEC ID Request

Full Name: ${fullName}
ID / Iqama Number: ${idIqama}
Date of Birth: ${dob}
Mobile Number: ${mobile}

Employee Email: ${employeeEmail}
Direct Manager Email: ${managerEmail}
Approval Authority: ${approval}

Blood Type: ${blood}
Educational Qualification: ${edu}

Project: ${project}
Contract Number: ${contract}
Region: ${region}
Request Type: ${type}

Required Attachments:
- ID Copy
- Personal Photo
- Muqeem Report
- Ajeer Report (if applicable)
`;

let subject = encodeURIComponent(`SEC ID Request - ${fullName}`);

let mail=`mailto:Omar.alqahtani@elsewedy.com?cc=${managerEmail}&subject=${subject}&body=${encodeURIComponent(body)}`;

window.location.href = mail;

}

</script>

</body>
</html>
